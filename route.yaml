apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: fitness-route
  namespace: default
spec:
  parentRefs:
    - name: example-gateway
      sectionName: http
  rules:
    # /fitness -> fitness-tracker-service
    - matches:
        - path:
            type: PathPrefix
            value: /fitness
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: fitness-tracker-service
          port: 80

    # /capsule -> capsule-service
    - matches:
        - path:
            type: PathPrefix
            value: /capsule
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: capsule-service
          port: 80
