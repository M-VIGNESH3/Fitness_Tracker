# route.yaml
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: fitness-route
  namespace: default
spec:
  parentRefs:
    - name: example-gateway     # <-- must match the Gateway name
      sectionName: http         # <-- binds to the 'http' listener
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /fitness
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: fitness-tracker-service   # <-- actual Service name
          port: 80
